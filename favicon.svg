<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <g transform="translate(20, 30) scale(0.6)">
        <!-- Car body -->
        <rect x="10" y="25" width="80" height="25" rx="5" fill="#ffffff"/>
        <rect x="25" y="10" width="50" height="25" rx="5" fill="#ffffff"/>
        <!-- Windows -->
        <rect x="30" y="15" width="40" height="15" rx="2" fill="#e5e7eb"/>
        <!-- Wheels -->
        <circle cx="25" cy="55" r="10" fill="#374151"/>
        <circle cx="75" cy="55" r="10" fill="#374151"/>
        <circle cx="25" cy="55" r="5" fill="#9ca3af"/>
        <circle cx="75" cy="55" r="5" fill="#9ca3af"/>
        <!-- Headlights -->
        <rect x="5" y="30" width="8" height="5" rx="2" fill="#fbbf24"/>
        <rect x="87" y="30" width="8" height="5" rx="2" fill="#fbbf24"/>
    </g>
</svg>